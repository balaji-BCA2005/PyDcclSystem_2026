<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Portal - Smart Placement</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #0b1120; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; color: #fff; }
        .login-card { background: #1e293b; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 400px; border-top: 5px solid #1877f2; text-align: center; }
        .login-card h2 { margin: 0 0 10px 0; font-size: 26px; }
        .login-card p { color: #94a3b8; font-size: 14px; margin-bottom: 30px; }
        .input-group { position: relative; margin-bottom: 20px; text-align: left; }
        .input-group i { position: absolute; left: 15px; top: 15px; color: #94a3b8; }
        .input-group input { width: 100%; padding: 12px 15px 12px 45px; border: 1px solid #334155; border-radius: 8px; background: #0f172a; color: #fff; font-size: 15px; box-sizing: border-box; outline: none; transition: 0.3s; }
        .input-group input:focus { border-color: #1877f2; box-shadow: 0 0 8px rgba(24,119,242,0.3); }
        .btn-login { width: 100%; padding: 12px; background: #1877f2; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .btn-login:hover { background: #0b5ed7; }
        .error-msg { background: #dc3545; color: white; padding: 10px; border-radius: 5px; margin-bottom: 20px; font-size: 14px; font-weight: bold; }
        .forgot-link { color: #94a3b8; font-size: 13px; text-decoration: none; transition: color 0.3s; }
        .forgot-link:hover { color: #1877f2; }
    </style>
</head>
<body>
    <div class="login-card">
        <div style="font-size: 50px; color: #1877f2; margin-bottom: 15px;">
            <i class="fas fa-user-shield"></i>
        </div>
        <h2>Admin Gateway</h2>
        <p>Authorized personnel only.</p>

        {% if error %}
            <div class="error-msg"><i class="fas fa-exclamation-triangle"></i> {{ error }}</div>
        {% endif %}

        <form method="POST" action="{{ url_for('admin_login') }}">
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" name="username" placeholder="Admin Username" required>
            </div>
            
            <div class="input-group" style="margin-bottom: 5px;">
                <i class="fas fa-lock"></i>
                <input type="password" name="password" placeholder="Password" required>
            </div>
            
            <div style="text-align: right; margin-bottom: 20px;">
                <a href="{{ url_for('forgot_password') }}" class="forgot-link">Forgot Password?</a>
            </div>
            
            <button type="submit" class="btn-login">Secure Login <i class="fas fa-sign-in-alt"></i></button>
        </form>
        
        <div style="margin-top: 20px; font-size: 13px;">
            <a href="{{ url_for('login') }}" style="color: #94a3b8; text-decoration: none;"><i class="fas fa-arrow-left"></i> Back to Student Login</a>
        </div>
    </div>
</body>
</html>
